# Render Blueprint — бесплатный хостинг бэкенда, фронтенда и PostgreSQL
# Деплой: https://dashboard.render.com/ → New → Blueprint → подключить репозиторий
databases:
  - name: eis-db
    databaseName: eis
    user: eis
    plan: free

services:
  - type: web
    name: eis-backend
    env: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python manage.py migrate --no-input && python manage.py collectstatic --no-input && python manage.py seed_data
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: PYTHON_VERSION
        value: "3.12.10"
      - key: DATABASE_URL
        fromDatabase:
          name: eis-db
          property: connectionString
      - key: FRONTEND_URL
        fromService:
          type: web
          name: eis-frontend
          envVarKey: RENDER_EXTERNAL_URL

  - type: web
    name: eis-frontend
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: eis-backend
          envVarKey: RENDER_EXTERNAL_URL
